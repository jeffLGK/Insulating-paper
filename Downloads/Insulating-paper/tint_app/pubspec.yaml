publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  html: ^0.15.4
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
