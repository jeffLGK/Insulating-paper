name: tint_app
description: 隔熱紙標籤辨識與搜尋 APP
publish_to: none
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  html: ^0.15.4
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.4
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.2.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  shimmer: ^2.0.0
  pull_to_refresh: ^2.0.0
  path_provider: ^2.1.3
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  image_cropper: ^12.2.0
  image: ^4.2.0
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A73E8"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
